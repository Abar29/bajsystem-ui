<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern Minimal Style -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e5631;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#163d23;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="200" height="200" rx="45" fill="url(#grad1)"/>
  
  <!-- Letter B stylized as a box -->
  <g transform="translate(60, 60)">
    <!-- Geometric B shape -->
    <path d="M 10 10 L 10 70 L 50 70 C 65 70 70 65 70 55 C 70 48 67 43 60 41 C 67 39 70 34 70 27 C 70 17 65 10 50 10 Z
             M 25 25 L 45 25 C 52 25 55 28 55 33 C 55 38 52 40 45 40 L 25 40 Z
             M 25 50 L 48 50 C 55 50 58 53 58 58 C 58 63 55 65 48 65 L 25 65 Z" 
          fill="#c9a961" 
          stroke="#c9a961" 
          stroke-width="2"/>
  </g>
  
  <!-- Geometric accent - 3 boxes stacked -->
  <g transform="translate(135, 145)" opacity="0.4">
    <rect x="0" y="0" width="20" height="20" fill="#c9a961" rx="3"/>
    <rect x="0" y="-25" width="20" height="20" fill="#c9a961" rx="3"/>
    <rect x="0" y="-50" width="20" height="20" fill="#c9a961" rx="3"/>
  </g>
</svg>
