<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ultra Modern Geometric Style -->
  <defs>
    <linearGradient id="modernGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d7a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e5631;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Soft rounded square -->
  <rect width="200" height="200" rx="50" fill="url(#modernGrad)"/>
  
  <!-- Abstract cube/box icon - isometric style -->
  <g transform="translate(100, 85)">
    <!-- Top face -->
    <path d="M 0 0 L 40 -23 L 0 -46 L -40 -23 Z" 
          fill="#3a9d5d" 
          stroke="#c9a961" 
          stroke-width="3"
          filter="url(#glow)"/>
    
    <!-- Left face -->
    <path d="M -40 -23 L -40 32 L 0 55 L 0 0 Z" 
          fill="#2d7a4a" 
          stroke="#c9a961" 
          stroke-width="3"/>
    
    <!-- Right face -->
    <path d="M 40 -23 L 40 32 L 0 55 L 0 0 Z" 
          fill="#245d39" 
          stroke="#c9a961" 
          stroke-width="3"/>
    
    <!-- Accent lines for detail -->
    <line x1="-20" y1="-12" x2="-20" y2="21" stroke="#c9a961" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="-12" x2="20" y2="21" stroke="#c9a961" stroke-width="2" opacity="0.5"/>
    
    <!-- Corner highlights -->
    <circle cx="0" cy="-46" r="4" fill="#e6d4a3"/>
    <circle cx="0" cy="55" r="4" fill="#e6d4a3"/>
  </g>
  
  <!-- Modern text element - "BAJ" stylized -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#c9a961" text-anchor="middle">BAJ</text>
</svg>
